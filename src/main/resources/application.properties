spring.application.name=Student-Dashboard


# Increase upload limits for OMR Excel sheets (Default is 1MB, which is too small)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ==========================================
# 2. POSTGRESQL CONFIGURATION (Neon)
# ==========================================
# Replace placeholders with your actual Neon credentials
spring.datasource.url=jdbc:postgresql://ep-soft-silence-ama5gg5q-pooler.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
spring.datasource.username=neondb_owner
spring.datasource.password=${NEON_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


# Connection Pooling (Recommended for serverless DBs like Neon)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate logic
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=100

# This allows Hibernate to group several INSERTs into one physical network packet
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Critical for Postgres performance: combines multiple inserts into one multi-row string
# This turns "INSERT...; INSERT...;" into "INSERT INTO table (...) VALUES (...), (...);"
spring.datasource.hikari.data-source-properties.reWriteBatchedInserts=true

# ==========================================
# 3. MONGODB CONFIGURATION (Atlas)
# ==========================================
# Replace with the URI you copied from the Atlas "Connect" screen
# Note: I added "/omr_storage" before the '?' to specify the database name
spring.data.mongodb.uri=mongodb+srv://premanshujhaa_db_user:${MONGO_PASSWORD}@cluster0.ml16kob.mongodb.net/omr_files?appName=Cluster0

# ==========================================
# 4. LOGGING (Helpful for debugging the Admin Flow)
